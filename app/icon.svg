<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>

    <!-- Wallet gradient -->
    <linearGradient id="wallet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" fill="url(#bg)" />

  <!-- Wallet -->
  <g filter="url(#shadow)">
    <rect x="180" y="380" width="664" height="360" rx="80" fill="url(#wallet)" />
  </g>

  <!-- Wallet flap -->
  <rect x="600" y="420" width="240" height="260" rx="60" fill="#1d4ed8"/>

  <!-- Button -->
  <circle cx="720" cy="550" r="18" fill="#fde047"/>

  <!-- Yen symbol -->
  <text x="360" y="600" font-size="220" fill="white" font-weight="700" font-family="Arial, sans-serif">
    ¥
  </text>

  <!-- Arrow -->
  <path d="M380 250 L640 250 M640 250 L600 210 M640 250 L600 290"
        stroke="white"
        stroke-width="18"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.9"/>

  <!-- Checkmark badge -->
  <circle cx="780" cy="260" r="70" fill="white" opacity="0.95"/>
  <path d="M740 260 L770 290 L820 230"
        stroke="#22c55e"
        stroke-width="20"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
