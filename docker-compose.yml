services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      # ホストのカレントディレクトリをコンテナの/appにマウント（ホットリロード用）
      - .:/app
      # コンテナ内のnode_modulesを保持（ホスト側で上書きされないようにする）
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      # Supabaseの環境変数（ホストの.env.localを読み込む設定）
    env_file:
      - .env.local
    # ホットリロードのためのポーリング設定（環境によっては必要）
    # environment:
    #   - WATCHPACK_POLLING=true
    command: sh -c "npm install && npm run dev"
